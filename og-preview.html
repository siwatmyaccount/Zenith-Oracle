<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; background: #05010a; }

  .card {
    width: 1200px; height: 630px;
    background: radial-gradient(ellipse at 30% 50%, #1b1229 0%, #05010a 65%);
    display: flex; align-items: center;
    position: relative; overflow: hidden;
    font-family: 'Georgia', serif;
  }

  /* วงแสงพื้นหลัง */
  .glow-orb {
    position: absolute; border-radius: 50%; pointer-events: none;
  }
  .glow-orb.g1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(212,175,55,0.12) 0%, transparent 70%);
    top: -100px; left: 200px;
  }
  .glow-orb.g2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(160,100,255,0.1) 0%, transparent 70%);
    bottom: -80px; left: 350px;
  }

  /* ลายวงกลมประ */
  .circle-deco {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(212,175,55,0.12);
    pointer-events: none;
  }

  /* รูปซ้าย */
  .img-side {
    width: 340px; height: 630px;
    flex-shrink: 0; position: relative;
    overflow: hidden;
  }
  .img-side img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center top;
    filter: brightness(0.85);
  }
  /* gradient fade ขวา */
  .img-side::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to right, transparent 50%, #05010a 100%);
  }

  /* content ขวา */
  .content {
    flex: 1; padding: 60px 70px 60px 50px;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; z-index: 2;
  }

  .brand {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 28px;
  }
  .brand-icon {
    width: 36px; height: 36px;
    border: 1.5px solid #d4af37;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .brand-icon svg { width: 18px; height: 18px; }
  .brand-name {
    font-family: 'Georgia', serif;
    font-size: 15px; letter-spacing: 5px;
    color: #d4af37; text-transform: uppercase;
  }

  .divider-line {
    width: 60px; height: 1px;
    background: linear-gradient(to right, #d4af37, transparent);
    margin-bottom: 28px;
  }

  .title {
    font-size: 54px; font-weight: bold;
    line-height: 1.15;
    background: linear-gradient(135deg, #fceabb 0%, #d4af37 50%, #b8860b 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 20px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 21px; color: rgba(255,255,255,0.75);
    line-height: 1.55; margin-bottom: 36px;
    font-family: 'Arial', sans-serif; font-weight: 300;
    letter-spacing: 0.3px;
  }

  .tags {
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .tag {
    padding: 7px 18px;
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 30px;
    font-size: 14px; color: #d4af37;
    font-family: 'Arial', sans-serif;
    background: rgba(212,175,55,0.07);
    letter-spacing: 0.5px;
  }

  .url {
    position: absolute; bottom: 40px; right: 70px;
    font-size: 14px; color: rgba(255,255,255,0.3);
    font-family: 'Arial', sans-serif; letter-spacing: 1px;
  }

  /* ดาวเล็กๆ */
  .star { position: absolute; color: rgba(212,175,55,0.5); font-size: 12px; }
</style>
</head>
<body>
<div class="card">
  <div class="glow-orb g1"></div>
  <div class="glow-orb g2"></div>
  <div class="circle-deco" style="width:700px;height:700px;top:-200px;left:100px;"></div>
  <div class="circle-deco" style="width:500px;height:500px;top:-80px;left:200px;"></div>

  <div class="star" style="top:80px;right:420px;">✦</div>
  <div class="star" style="top:200px;right:160px;font-size:8px;">✦</div>
  <div class="star" style="bottom:120px;right:300px;">✦</div>
  <div class="star" style="top:320px;right:80px;font-size:8px;opacity:0.4;">✦</div>

  <div class="img-side">
    <img src="oracle.jpg" alt="Oracle">
  </div>

  <div class="content">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="2">
          <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
        </svg>
      </div>
      <span class="brand-name">Zenith Oracle</span>
    </div>

    <div class="divider-line"></div>

    <div class="title">พยากรณ์<br>ชะตาชีวิต</div>

    <div class="subtitle">เปิดไพ่ทาโรต์ดูดวงเรื่องความรัก การเงิน การงาน<br>พร้อม AI วิเคราะห์คำทำนายเฉพาะคุณ</div>

    <div class="tags">
      <span class="tag">ไพ่ทาโรต์</span>
      <span class="tag">ดูดวง AI</span>
      <span class="tag">ความรัก</span>
      <span class="tag">การเงิน</span>
      <span class="tag">การงาน</span>
    </div>

    <div class="url">siwatmyaccount.github.io/Zenith-Oracle</div>
  </div>
</div>
</body>
</html>
